<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#090d16">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Form Constants Visualizer</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌀</text></svg>">
    
    <link rel="stylesheet" href="style.css?v=21">
</head>
<body>
    <div id="app-container">
        <!-- Canvas Viewport Area -->
        <div id="canvas-container">
            <canvas id="viewport-canvas"></canvas>
            <!-- Floating Corner Controls -->
            <div id="floating-controls">
                <button id="btn-floating-heart" class="floating-btn" title="Toggle Favorite">
                    <svg viewBox="0 0 24 24" width="20" height="20" class="heart-icon">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
                <button id="btn-floating-fullscreen" class="floating-btn" title="Toggle Fullscreen">
                    <svg viewBox="0 0 24 24" width="20" height="20" class="fullscreen-icon">
                        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
            <!-- Music Listening Indicator -->
            <div id="music-indicator" class="hidden">
                <div class="music-bars">
                    <div class="music-bar"></div>
                    <div class="music-bar"></div>
                    <div class="music-bar"></div>
                </div>
                <div class="music-text-container" style="display: flex; flex-direction: column; gap: 2px;">
                    <span class="music-status" style="font-weight: 700; color: #38bdf8;">Music Active</span>
                    <span class="music-debug-info" style="font-size: 0.65rem; color: #94a3b8; font-family: monospace; font-weight: 400; opacity: 0.85;"></span>
                </div>
            </div>
            <div id="toast" class="hidden"></div>
        </div>
        
        <!-- Interactive Control Panel (Sidebar on desktop / bottom-sheet on mobile) -->
        <div id="control-panel">
            <div id="panel-drag-handle" class="drag-handle" title="Drag to resize / click to toggle">
                <div class="drag-pill"></div>
            </div>
            
            <header id="panel-header">
                <h1>FORM CONSTANTS VISUALIZER</h1>
            </header>
            
            <div id="panel-scroll">
                <!-- Section 2: Layer Settings -->
                <section class="control-section">
                    <div class="tabs-group" id="layer-tabs">
                        <button class="tab-btn active" data-layer="0">Layer 1</button>
                        <button class="tab-btn" data-layer="1">Layer 2</button>
                        <button class="tab-btn" data-layer="2">Layer 3</button>
                        <button class="tab-btn" data-layer="3">Layer 4</button>
                    </div>
                    
                    <div class="checkbox-row lock-input-group">
                        <button id="btn-lock-layer-active" class="lock-btn" title="Lock Layer Active State"><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M11 1a3.5 3.5 0 0 0-3.5 3.5V6H1v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6h-3.5V4.5a2.5 2.5 0 0 1 5 0V6h1V4.5A3.5 3.5 0 0 0 11 1z"/></svg></button>
                        <label class="checkbox-container">
                            <input type="checkbox" id="chk-layer-active" checked>
                            <span class="checkmark"></span>
                            Layer Enabled
                        </label>
                    </div>
                    
                    <div class="tabs-row">
                        <div class="lock-input-group">
                            <button id="btn-lock-layer-type" class="lock-btn" title="Lock Layer Type"><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M11 1a3.5 3.5 0 0 0-3.5 3.5V6H1v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6h-3.5V4.5a2.5 2.5 0 0 1 5 0V6h1V4.5A3.5 3.5 0 0 0 11 1z"/></svg></button>
                            <div class="tabs-group secondary" id="type-tabs" style="flex: 1;">
                                <button class="tab-btn active" data-type="Spirals">Spirals</button>
                                <button class="tab-btn" data-type="Cobwebs">Cobwebs</button>
                                <button class="tab-btn" data-type="Tunnels">Tunnels</button>
                                <button class="tab-btn" data-type="Lattices">Lattices</button>
                                <button class="tab-btn" data-type="Phyllo">Phyllo</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Dynamic Layer Sliders Container (Injected by JS) -->
                    <div id="dynamic-sliders-container"></div>
                </section>
                
                <!-- Section 3: Global Parameters -->
                <section class="control-section">
                    <h3 class="section-title">GLOBAL SETTINGS</h3>
                    
                    <div class="slider-row">
                        <div class="slider-header">
                            <span>Global Scale</span>
                            <span id="val-global-scale">1.00</span>
                        </div>
                        <div class="lock-input-group">
                            <button class="lock-btn" data-lock="globalScale" title="Lock Global Scale"><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M11 1a3.5 3.5 0 0 0-3.5 3.5V6H1v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6h-3.5V4.5a2.5 2.5 0 0 1 5 0V6h1V4.5A3.5 3.5 0 0 0 11 1z"/></svg></button>
                            <input type="range" id="slide-global-scale" min="0.2" max="1.8" step="0.01" value="1.0">
                        </div>
                    </div>
                    
                    <div class="slider-row">
                        <div class="slider-header">
                            <span>Line Thickness</span>
                            <span id="val-global-thick">1.50</span>
                        </div>
                        <div class="lock-input-group">
                            <button class="lock-btn" data-lock="globalLineWidth" title="Lock Line Thickness"><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M11 1a3.5 3.5 0 0 0-3.5 3.5V6H1v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6h-3.5V4.5a2.5 2.5 0 0 1 5 0V6h1V4.5A3.5 3.5 0 0 0 11 1z"/></svg></button>
                            <input type="range" id="slide-global-thick" min="0.5" max="7" step="0.1" value="1.5">
                        </div>
                    </div>
                    
                    <div class="slider-row">
                        <div class="slider-header">
                            <span>Color Shift</span>
                            <span id="val-global-shift">0.00</span>
                        </div>
                        <div class="lock-input-group">
                            <button class="lock-btn" data-lock="globalColorShift" title="Lock Color Shift"><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M11 1a3.5 3.5 0 0 0-3.5 3.5V6H1v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6h-3.5V4.5a2.5 2.5 0 0 1 5 0V6h1V4.5A3.5 3.5 0 0 0 11 1z"/></svg></button>
                            <input type="range" id="slide-global-shift" min="0" max="1" step="0.01" value="0.0">
                        </div>
                    </div>
                    
                    <div class="slider-row">
                        <div class="slider-header">
                            <span>Global Rotation</span>
                            <span id="val-global-rot">0°</span>
                        </div>
                        <div class="lock-input-group">
                            <button class="lock-btn" data-lock="globalRotation" title="Lock Global Rotation"><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M11 1a3.5 3.5 0 0 0-3.5 3.5V6H1v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6h-3.5V4.5a2.5 2.5 0 0 1 5 0V6h1V4.5A3.5 3.5 0 0 0 11 1z"/></svg></button>
                            <input type="range" id="slide-global-rot" min="0" max="360" step="1" value="0">
                        </div>
                    </div>
                </section>

                <!-- Section 1: Presets & Colors -->
                <section class="control-section">
                    <div class="row">
                        <label>Color Palette</label>
                        <div class="lock-input-group">
                            <button class="lock-btn" data-lock="palette" title="Lock Color Palette"><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M11 1a3.5 3.5 0 0 0-3.5 3.5V6H1v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6h-3.5V4.5a2.5 2.5 0 0 1 5 0V6h1V4.5A3.5 3.5 0 0 0 11 1z"/></svg></button>
                            <div id="control-palette" class="segmented-control palette-grid" style="flex: 1;">
                                <button class="segment-btn active" data-palette-idx="0">Cyber</button>
                                <button class="segment-btn" data-palette-idx="1">Gold</button>
                                <button class="segment-btn" data-palette-idx="2">Aurora</button>
                                <button class="segment-btn" data-palette-idx="3">Sage</button>
                                <button class="segment-btn" data-palette-idx="4">Lava</button>
                                <button class="segment-btn" data-palette-idx="5">Ocean</button>
                                <button class="segment-btn" data-palette-idx="6">Prism</button>
                                <button class="segment-btn" data-palette-idx="7">Dream</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col">
                            <label>My Favorites</label>
                            <div class="favorites-row">
                                <select id="select-favorites" class="select-dropdown">
                                    <option value="" disabled selected>No saved favorites</option>
                                </select>
                                <button id="btn-save-favorite" class="fav-action-btn" title="Save Current Design">Save</button>
                                <button id="btn-delete-favorite" class="fav-action-btn danger-btn" title="Delete Selected Favorite">Delete</button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Section 2: Autoplay -->
                <section class="control-section">
                    <div class="row">
                        <div class="col">
                            <label>Autoplay Screensaver</label>
                            <div id="control-autoplay" class="segmented-control">
                                <button class="segment-btn active" data-mode="off">Off</button>
                                <button class="segment-btn" data-mode="random">Random</button>
                                <button class="segment-btn" data-mode="favorites">Favorites</button>
                                <button class="segment-btn" data-mode="music">Music</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col">
                            <div class="slider-header">
                                <span>Transition Speed</span>
                                <span id="val-transition-speed">1.5s</span>
                            </div>
                            <input id="slide-transition-speed" type="range" min="0.5" max="8.0" step="0.1" value="1.5">
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col">
                            <div class="slider-header">
                                <span>Phrase Shift Beats (Music Mode)</span>
                                <span id="val-music-beats">16 beats</span>
                            </div>
                            <input id="slide-music-beats" type="range" min="4" max="64" step="4" value="16">
                        </div>
                    </div>
                </section>
            </div>
            
            <!-- Bottom Sticky Actions -->
            <footer id="panel-actions">
                <button id="btn-undo" class="action-btn secondary-btn" disabled>Undo</button>
                <button id="btn-randomize" class="action-btn secondary-btn">Random</button>
                <button id="btn-export-trans" class="action-btn primary-btn">Export Trans</button>
                <button id="btn-export-dark" class="action-btn primary-btn">Export Dark</button>
            </footer>
        </div>
    </div>
    
    <!-- Code Script -->
    <script src="app.js?v=21"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered successfully.'))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
